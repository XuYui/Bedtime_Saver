</button>

<main class="px-margin pt-lg space-y-lg max-w-2xl mx-auto">

<section class="flex gap-gutter">

<div class="flex items-baseline gap-xs mt-xs">

</div>
</div>
<div class="flex-1 bg-surface-container p-md rounded-xl border border-outline-variant">

<div class="flex items-center gap-xs">
<div class="matrix-dot bg-secondary-container"></div>
<span class="text-[10px] text-on-surface-variant">达标</span>
</div>
<div class="flex items-center gap-xs">
<div class="matrix-dot bg-error-container"></div>
<span class="text-[10px] text-on-surface-variant">未达标</span>
</div>
</div>
</div>
<div class="grid grid-cols-7 gap-y-gutter gap-x-0 justify-items-center">
<!-- Matrix Generation (Mock Data for 35 days) -->
<!-- We'll use a loop-like pattern in HTML for simplicity -->
<!-- Success states use bg-secondary-container, failures use bg-error-container, empty uses bg-surface-container-highest -->
<script>
                    const matrixContainer = document.currentScript.parentElement;
                    const states = [
                        'bg-secondary-container', 'bg-secondary-container', 'bg-secondary-container', 'bg-error-container', 'bg-secondary-container', 'bg-secondary-container', 'bg-secondary-container',
                        'bg-secondary-container', 'bg-surface-variant', 'bg-secondary-container', 'bg-secondary-container', 'bg-error-container', 'bg-secondary-container', 'bg-secondary-container',
                        'bg-secondary-container', 'bg-secondary-container', 'bg-secondary-container', 'bg-secondary-container', 'bg-secondary-container', 'bg-secondary-container', 'bg-surface-variant',
                        'bg-secondary-container', 'bg-secondary-container', 'bg-error-container', 'bg-secondary-container', 'bg-secondary-container', 'bg-secondary-container', 'bg-secondary-container',
                        'bg-secondary-container', 'bg-secondary-container', 'bg-secondary-container', 'bg-secondary-container', 'bg-secondary-container', 'bg-secondary-container', 'bg-secondary-container'
                    ];
                    states.forEach(state => {
                        document.write(`<div class="matrix-dot ${state}"></div>`);
                    });
                </script>
</div>
<div class="flex justify-between mt-md px-xs">
<span class="text-[10px] text-on-surface-variant">5周前</span>

<div class="bg-surface-container-high w-full max-w-sm rounded-xl border border-outline-variant p-lg animate-fade-in">
<h3 class="font-headline-md text-on-surface mb-base">确认删除？</h3>
<p class="font-body-md text-on-surface-variant mb-xl">此操作将永久删除该条睡眠记录，且无法恢复。</p>
<div class="flex gap-md justify-end">
<button class="px-lg py-sm font-label-md text-on-surface-variant hover:bg-surface-variant rounded-xl transition-colors" onclick="hideDeleteModal()">
                    取消
                </button>
<button class="px-lg py-sm font-label-md bg-error text-on-error rounded-xl hover:bg-opacity-90 transition-colors" onclick="confirmDelete()">
                    删除
                </button>
</div>
</div>

<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-margin py-xs bg-surface-container-low border-t border-outline-variant rounded-t-xl">

<span class="material-symbols-outlined mb-1" data-icon="history" style="font-variation-settings: 'FILL' 1;">history</span>
<span class="font-label-md text-label-md">记录</span>
</button>

<script>
        let currentDeleteId = null;

        function showDeleteModal(id) {
            currentDeleteId = id;
            const modal = document.getElementById('deleteModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function hideDeleteModal() {
            const modal = document.getElementById('deleteModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            currentDeleteId = null;
        }

        function confirmDelete() {
            // Logic for deletion would go here
            console.log('Deleting record:', currentDeleteId);
            hideDeleteModal();
            // Provide visual feedback (e.g., snackbar or toast could be added here)
        }

        // Close modal when clicking backdrop
        document.getElementById('deleteModal').addEventListener('click', function(e) {
            if (e.target === this) hideDeleteModal();
        });
    </script>
